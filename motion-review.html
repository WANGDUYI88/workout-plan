<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="训练动作正式动图审核页。">
    <title>动作动图审核 | 居家肩臂训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="text-gray-800">
    <div class="content-wrapper">
        <header class="pt-10 pb-6 px-4">
            <div class="max-w-5xl mx-auto text-center">
                <div class="mb-4">
                    <a href="index.html" class="inline-flex items-center gap-2 text-white/70 hover:text-white text-sm transition-colors">
                        <span>←</span> 返回训练计划
                    </a>
                </div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-2 drop-shadow-lg tracking-tight">
                    动作动图审核
                </h1>
                <p class="text-lg text-white/80">
                    正式页面现在使用这套 animated WebP 动图
                </p>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 pb-20">
            <section class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">01 手臂大绕环</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/01-warmup-arm-circles.webp" alt="手臂大绕环动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">02 弹力带肩后激活</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/02-warmup-band-pull-apart.webp" alt="弹力带肩后激活动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">03 毛巾肩部环绕</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/03-warmup-shoulder-dislocates.webp" alt="毛巾肩部环绕动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">04 墙壁俯卧撑标准姿势</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/04-wall-pushup-standard.webp" alt="墙壁俯卧撑标准姿势动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">05 弹力带侧平举</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/05-lateral-raise.webp" alt="弹力带侧平举动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">06 弹力带面拉</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/06-face-pull.webp" alt="弹力带面拉动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">07 椅子臂屈伸</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/07-tricep-dip.webp" alt="椅子臂屈伸动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">08 跪姿俯卧撑</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/08-kneeling-pushup.webp" alt="跪姿俯卧撑动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">09 哑铃坐姿肩推</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/09-shoulder-press.webp" alt="哑铃坐姿肩推动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">10 单臂哑铃划船</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/10-bent-row.webp" alt="单臂哑铃划船动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">11 哑铃弯举</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/11-bicep-curl.webp" alt="哑铃弯举动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">12 门框胸肌拉伸</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/12-stretch-doorway-chest.webp" alt="门框胸肌拉伸动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">13 交叉肩部拉伸</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/13-stretch-cross-shoulder.webp" alt="交叉肩部拉伸动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">14 过头三头肌拉伸</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/14-stretch-triceps.webp" alt="过头三头肌拉伸动图">
                </article>
                <article class="glass-card rounded-3xl p-5">
                    <h2 class="font-bold text-lg mb-3">15 坐姿侧弯放松</h2>
                    <img class="rounded-2xl w-full" src="assets/motion/15-stretch-side-bend.webp" alt="坐姿侧弯放松动图">
                </article>
            </section>
        </main>
    </div>
</body>
</html>
